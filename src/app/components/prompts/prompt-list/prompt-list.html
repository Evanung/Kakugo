<p-table [value]="prompt()" stripedRows
         class="flex g"
>
  <ng-template #header>
    <tr>
      <th>Status</th>
      <th>Title</th>
      <th>Difficulty</th>
      <th>Responses</th>
    </tr>
  </ng-template>
  <ng-template #body let-prompt>
    <tr class="rounded-sm">
      @if (prompt.status === true){
        <td><i class="pi pi-check" style="color: green"></i></td>
      } @else {
        <td></td>
      }

      <td >{{ prompt.title }}</td>

      @if (prompt.difficulty === 'Easy'){
        <td class="text-lime-600"> {{ prompt.difficulty }} </td>
      }
      @else if (prompt.difficulty === 'Medium'){
        <td class="text-orange-600">{{ prompt.difficulty }}</td>
      }@else {
        <td class="text-red-600"> {{ prompt.difficulty }}</td>
      }
      <td>{{ prompt.responses }}</td>
    </tr>
  </ng-template>
</p-table>
