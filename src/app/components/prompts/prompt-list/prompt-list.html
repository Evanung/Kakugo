
<p-table #dt1 [value]="prompts()" stripedRows
         [globalFilterFields]="['prompt_title',]"
         (sortFunction)="customSort($event)" [customSort]="true"
         selectionMode="single" [(selection)]="selectedPrompt" (onRowSelect)="onRowSelect($event)"
         class="flex g">

  <ng-template #caption>
    <div class="flex justify-between">
      <p-iconfield>
        <p-inputicon>
          <i class="pi pi-search"></i>
        </p-inputicon>
        <input pInputText type="text" (input)="dt1.filterGlobal($event.target!, 'contains')" placeholder="Search keyword" />
      </p-iconfield>
      <p-button class="border-purple-600" label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />

    </div>
  </ng-template>
  <ng-template #header>
    <tr>
      <th pSortableColumn='status'>Status <p-sortIcon field="code" /></th>
      <th pSortableColumn='prompt_title'>Title <p-sortIcon field="code" /></th>
      <th pSortableColumn='difficulty'>Difficulty <p-sortIcon field="code" /></th>
      <th pSortableColumn='responses'>Responses <p-sortIcon field="code" /></th>
    </tr>
  </ng-template>
  @if (isLoading){
  <ng-template #body let-prompt>

    <tr>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
    </tr>
  </ng-template>
  }
  <ng-template #body let-prompt>

    <tr class="rounded-sm" [pSelectableRow]="prompt">
      @if (prompt.status === true){
        <td><i class="pi pi-check" style="color: green"></i></td>
      } @else {
        <td></td>
      }
      <td >{{ prompt.prompt_title }}</td>

      @if (prompt.difficulty == 1){
        <td class="text-lime-600">Easy</td>
      }
      @else if (prompt.difficulty == 2){
        <td class="text-orange-600">Medium</td>
      }@else {
        <td class="text-red-600">Hard</td>
      }
      <td>{{ prompt.responses }}</td>
    </tr>
  </ng-template>

</p-table>
