<div class="md:p-16 p-8 bg-surface-0 dark:bg-surface-900 rounded-2xl shadow-sm flex flex-col gap-12 h-full">
  <div class="flex flex-col gap-4">
    <div class="text-2xl font-semibold text-surface-900 dark:text-surface-0">Reset Password</div>
    <div>
      <span class="text-surface-600 dark:text-surface-300">Enter your new password</span>

    </div>
  </div>
  <div class="flex flex-col gap-8">

    <div class="flex flex-col gap-6">
      <div class="flex flex-col gap-2">
        <label for="password4" class="text-surface-900 dark:text-surface-0 font-medium">Password</label>
        <input pInputText id="password4" type="password"
               placeholder="Password"
               [ngModel]="password()"
               (ngModelChange)="password.set($event)" class="w-full rounded-md shadow-sm" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="confirmPassword4" class="text-surface-900 dark:text-surface-0 font-medium">Confirm Password</label>
        <input pInputText id="confirmPassword4" type="password"
               placeholder="Confirm Password"
               [ngModel]="confirmPassword()"
               (ngModelChange)="confirmPassword.set($event)" class="w-full rounded-md shadow-sm" />
      </div>
      <button pButton (click)="updatePassword()"
              [disabled]="loading()"
              class="">
        <span pButtonLabel>Reset Password</span>
      </button>
      @if (errorMessage()) {
        <p class="text-red-500 text-sm">{{ errorMessage() }}</p>
      }
    </div>
  </div>
</div>
