@for(post of posts; track post.id) {
  <div class="flex gap-4 py-4 flex-col md:flex-row border-b">
    <p-avatar image="https://fqjltiegiezfetthbags.supabase.co/storage/v1/render/image/public/block.images/blocks/avatars/circle/avatar-f-6.png" shape="square" size="large" class="w-10 h-10 rounded-lg"></p-avatar>
    <div class="flex-1 flex flex-col gap-3">
      <div class="text-surface-900 dark:text-surface-0 font-medium leading-tight"> {{ post.profiles.display_name }}</div>
      <div class="text-surface-900 dark:text-surface-200 leading-normal" [innerHTML]="post.description"></div>

    </div>
  </div>
}
