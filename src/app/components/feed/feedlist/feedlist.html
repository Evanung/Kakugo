
    <div class="pb-6 flex items-center justify-between">
      <h3 class="text-lg text-surface-900 dark:text-surface-0 font-medium leading-tight">What people are saying</h3>
    </div>

    <div class="relative border-t border-surface-200 dark:border-surface-700">
      <div #scrollContainer class="overflow-x-auto">
        <ul class="p-0 m-0 list-none flex select-none min-w-max relative">
          @for (navItem of navs(); track navItem.id; let index = $index) {
            <li #tabRef>
              <a
                class="cursor-pointer py-4 px-4 flex items-center transition-colors duration-150 hover:text-purple-500 font-medium leading-normal"
                [ngClass]="{
                    'text-purple-500 font-semibold': selectedNav() === navItem.id,
                    'text-surface-900 dark:text-surface-0': selectedNav() !== navItem.id
                }"
                (click)="setActiveTab(index)"
              >
                <span>{{ navItem.label }}</span>
              </a>
            </li>
          }
          <div
            class="absolute bottom-0 rounded-lg h-[2px] bg-purple-500 transition-transform duration-300 ease-in-out z-20"
            [style.width.px]="indicatorWidth()"
            [style.transform]="'translateX(' + indicatorLeft() + 'px)'"
          ></div>
        </ul>
      </div>
      <div class="absolute bottom-0 left-0 w-full h-px bg-surface-200 dark:bg-surface-700"></div>
    </div>

    <div class="p-6 px-3 flex flex-col gap-6 md:p-6">
      <div class="flex flex-col gap-4">
        <app-feedbox></app-feedbox>
      </div>
    </div>
