<div class="flex gap-5 mb-5">
  <p-iconfield>
    <p-inputicon>
      <i class="pi pi-search"></i>
    </p-inputicon>
    <input
      pInputText
      type="text"
      [value]="word()"
      (input)="word.set($any($event.target).value)"
      placeholder="Search keyword"
      (keyup.enter)="onSearch()"
    />
  </p-iconfield>
  <p-button (click)="onSearch()">Search</p-button>
</div>

@if (isLoading()) {
  @for(i of [1,2,3,4,5,6]; track $index){
    <div class="grid grid-cols-5 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 my-5">
      <div class="col-span-1">
        <p-skeleton size="3rem" class="mb-2" />
        <p-skeleton width="25%" class="mr-2" />
      </div>
      <div class="col-span-3 flex flex-col gap-2">
        <p-skeleton width="100%" class="mb-2" />
        <p-skeleton width="75%" class="mb-2" />
        <p-skeleton width="100" />
      </div>
    </div>
  }
}

@if (error()) {
  <div>{{ error() }}</div>
}

@for (result of results(); track result.id) {
  <div class="grid grid-cols-4 gap-4 border-b dark:border-surface-700 py-5">

    <div class="col-span-1">
      <div class="text-2xl">{{ result.grammar }}</div>
      <div class="text-sm text-gray-500">{{ result.furigana_reading }}</div>
      <div class="text-xs text-gray-400 mt-1">{{ result.jlpt_level }}</div>
    </div>

    <div class="col-span-3 flex items-center">
      {{ result.meaning }}
    </div>

  </div>
}
