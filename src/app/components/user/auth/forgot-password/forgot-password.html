<div class="md:p-16 p-8 bg-surface-0 dark:bg-surface-900 rounded-2xl shadow-sm flex flex-col gap-12 h-full">
  <div class="flex flex-col gap-4">
    <div class="text-2xl font-semibold text-surface-900 dark:text-surface-0">Forgot your password?</div>
    <div>
      <span class="text-surface-600 dark:text-surface-300">Enter the email with the associated account and we will send a reset password link</span>

    </div>
    <div>
      <span class="text-surface-600 dark:text-surface-300">Have an account? </span>
      <a class="text-purple-500 text-primary font-medium cursor-pointer" [routerLink]="['/auth/login']" >Sign In</a>
    </div>
  </div>
  <div class="flex flex-col gap-8">

    <div class="flex flex-col gap-6">
      <div class="flex flex-col gap-2">
        <label for="email4" class="text-surface-900 dark:text-surface-0 font-medium">Email Address</label>
        <input pInputText id="email4" type="email"
               placeholder="Email"
               [ngModel]="email()"
               (ngModelChange)="email.set($event)" class="w-full rounded-md shadow-sm" />
      </div>
      <button pButton (click)="resetPassword()"
              [disabled]="loading()"
              class="">
        <span pButtonLabel>Reset Password</span>
      </button>
      @if (errorMessage()) {
        <p class="text-red-500 text-sm">{{ errorMessage() }}</p>
      }
    </div>
  </div>
</div>
