<div class="flex shrink h-[80vh] w-screen px-8 mx-auto mb-10">
  <p-splitter [panelSizes]="[40, 60]" class="flex-1 min-w-0 gap-4">

    <ng-template #panel>
      <div class="rounded-lg border border-surface-200 dark:border-surface-600 h-full overflow-hidden">
        <p-tabs lazy value="0">
          <p-tablist>
            <p-tab value="0">Prompt</p-tab>
            <p-tab value="1">Dictionary</p-tab>
            <p-tab value="2">Grammar</p-tab>
          </p-tablist>
          <p-tabpanels class="h-screen">
            <p-tabpanel value="0">
                @if (prompt()) {
                  <app-prompt-info [prompt]="prompt()!"></app-prompt-info>
                }
            </p-tabpanel>
            <p-tabpanel value="1">

            </p-tabpanel>
            <p-tabpanel value="2">
              <ng-template #content>Complex components that should only be initialized when the tab becomes active</ng-template>
            </p-tabpanel>
          </p-tabpanels>
        </p-tabs>
      </div>
    </ng-template>


    <ng-template #panel>
      <app-text-box></app-text-box>
    </ng-template>
  </p-splitter>
</div>
