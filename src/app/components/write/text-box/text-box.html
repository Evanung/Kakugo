<p-editor [(ngModel)]="text">
  <ng-template #header>
    <span class="flex ql-formats h-10 content-center">
      <button type="button" class="ql-bold toolbar-btn" aria-label="Bold"></button>
      <button type="button" class="ql-italic toolbar-btn" aria-label="Italic"></button>
      <button type="button" class="ql-underline toolbar-btn" aria-label="Underline"></button>
    </span>
  </ng-template>
</p-editor>
