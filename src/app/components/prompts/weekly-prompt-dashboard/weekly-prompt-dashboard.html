@if (weeklyPrompt$ | async; as wp) {
  <a [routerLink]="['/write/', wp.prompt_response_count.id]" class="nav-link text-surface-900 dark:text-white gap-3 flex flex-wrap flex-col dark:hover:bg-hover:bg-violet-600 border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-900">
    <div class="flex w-full justify-between">
      <b class="text-purple-500 text-m">Weekly Prompt</b>
      <div class="flex items-center justify-center bg-linear-to-b from-violet-400 dark:from-violet-300 to-violet-600 dark:to-violet-500 rounded-lg w-10 h-10">
        <i class="pi pi-calendar-clock text-surface-0 dark:text-surface-900 text-xl! leading-none!"></i>
      </div>
    </div>
    <span class="text-xl font-bold">{{wp.prompt_response_count.prompt_title}}</span>
    <p class="text-gray-500">{{wp.description}}</p>
    <div class="flex items-center gap-2">
      <div class="flex w-fit items-center rounded-xl border border-purple-600 gap-3 py-1 px-2">
        <span class="text-purple-500">Begin Writing</span>
        <i class="pi pi-chevron-right text-purple-500"></i>
      </div>
      <span class="text-surface-600">{{wp.prompt_response_count.response_count}} submissions</span>
    </div>
  </a>
} @else {
  <div class="nav-link gap-3 flex flex-wrap flex-col border-surface-200 dark:border-surface-600 bg-white dark:bg-surface-900">
    <div class="flex w-full justify-between">
      <p-skeleton width="6rem" height="1rem" />
      <p-skeleton size="2.5rem" borderRadius="0.5rem" />
    </div>
    <p-skeleton width="80%" height="1.5rem" />
    <div class="flex flex-col gap-2">
      <p-skeleton width="100%" />
      <p-skeleton width="60%" />
    </div>
    <div class="flex items-center gap-2">
      <p-skeleton width="8rem" height="2rem" borderRadius="0.75rem" />
      <p-skeleton width="5rem" />
    </div>
  </div>
}
