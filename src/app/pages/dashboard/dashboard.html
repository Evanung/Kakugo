<div class="max-w-6xl mx-auto px-4 sm:px-8">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

    <!-- Write / Prompts buttons — top, full width on mobile, spans 2 cols on desktop -->
    <div class="flex gap-5 lg:col-span-2">
      <a class="nav-link text-white bg-violet-600 dark:hover:bg-violet-700 border-4 border-violet-500 flex-grow"
         routerLink="write">
        <span>Write</span>
      </a>
      <a class="nav-link text-white bg-violet-500 dark:hover:bg-violet-600 border-violet-500 flex-grow"
         routerLink="prompts">
        <span>Prompts</span>
      </a>
    </div>
    <app-weekly-prompt-dashboard class="w-full lg:col-span-2"></app-weekly-prompt-dashboard>

    <!-- Stats column — spans 3 rows on desktop, sits in middle on mobile -->
    <div class="flex flex-col gap-5 lg:row-span-3 lg:row-start-1 lg:col-start-3">
      <p-datePicker class="w-full" [inline]="true"></p-datePicker>
      <app-prompt-stats class="w-full"></app-prompt-stats>
      <div class="flex gap-5">
        <div class="flex flex-1 flex-col bg-surface-900 rounded-xl p-5">
          <span>Submissions</span>
          <span class="text-xl">5</span>
        </div>
        <div class="flex flex-1 flex-col bg-surface-900 rounded-xl p-5">
          <span>Streak</span>
          <span class="text-xl">10</span>
        </div>
      </div>
    </div>


    <!-- Feed -->
    <app-feedlist class="w-full lg:col-span-2"></app-feedlist>

  </div>
</div>
